<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reservaciones | Hotel Quinta Dalam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="header">
<nav class="nav">
<div class="logo">HOTEL QUINTA DALAM</div>

<div class="idioma">
<button onclick="cambiarIdioma('es')">ES</button>
<button onclick="cambiarIdioma('en')">EN</button>
</div>

<ul class="menu">
<li><a href="index.html" id="menuInicio">Inicio</a></li>
<li><a href="habitaciones.html" id="menuHabitaciones">Habitaciones</a></li>
<li><a href="reservaciones.html" class="active" id="menuReservaciones">Reservaciones</a></li>
<li><a href="contacto.html" id="menuContacto">Contacto</a></li>
<li><a href="mision-vision.html" id="menuMision">Misión & Visión</a></li>
</ul>
</nav>
</header>

<main>

<section class="hero">
<div class="hero-content">

<h1 id="tituloReservaciones">Reservaciones</h1>

<p id="subtituloReservaciones">
Reserva tu experiencia exclusiva en Hotel Quinta Dalam.
</p>

</div>
</section>

<section class="section">
<div class="container">

<h2 id="tituloFormulario">Formulario de Reserva</h2>

<form class="form-reserva" action="#" method="post">

<div class="form-grid">

<div>
<label id="labelNombre" for="nombre">Nombre completo</label>
<input type="text" id="nombre" name="nombre" required>
</div>

<div>
<label id="labelCorreo" for="correo">Correo electrónico</label>
<input type="email" id="correo" name="correo" required>
</div>

<div>
<label id="labelTelefono" for="telefono">Teléfono</label>
<input type="tel" id="telefono" name="telefono" required>
</div>

<div>
<label id="labelHabitacion" for="habitacion">Tipo de habitación</label>
<select id="habitacion" name="habitacion" required>
<option value="" id="optDefault">Seleccione una opción</option>
<option value="sencilla" id="optSencilla">Habitación Sencilla</option>
<option value="doble" id="optDoble">Habitación Doble</option>
<option value="matrimonial" id="optMatrimonial">Habitación Matrimonial</option>
<option value="familiar" id="optFamiliar">Habitación Familiar</option>
</select>
</div>

<div>
<label id="labelEntrada" for="entrada">Fecha de entrada</label>
<input type="date" id="entrada" name="entrada" required>
</div>

<div>
<label id="labelSalida" for="salida">Fecha de salida</label>
<input type="date" id="salida" name="salida" required>
</div>

<div>
<label id="labelAdultos" for="adultos">Número de adultos</label>
<input type="number" id="adultos" name="adultos" min="1" max="10" required>
</div>

<div>
<label id="labelNinos" for="ninos">Número de niños</label>
<input type="number" id="ninos" name="ninos" min="0" max="10">
</div>

</div>

<div class="form-boton">
<button type="submit" id="btnConfirmar">Confirmar Reserva</button>
</div>

</form>

</div>
</section>

</main>

<footer class="footer">
<p id="footerTexto">© 2026 Hotel Quinta Dalam - Todos los derechos reservados</p>
</footer>

<script src="js/reservas.js"></script>

<script>
window.addEventListener("scroll", function() {
const header = document.querySelector(".header");
header.classList.toggle("scrolled", window.scrollY > 50);
});
</script>

<script src="js/idioma.js"></script>

</body>
</html>
